server:
  port: 8090

spring:
  application:
    name: singularity-user
  datasource:
    url: jdbc:mysql://localhost:3306/singularity_user?useSSL=false&serverTimezone=Asia/Shanghai
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: localhost
      port: 6379

mybatis:
  mapper-locations: classpath:mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

auth:
  jwt:
    secret: ${JWT_SECRET:dev-secret-key}
    expire-seconds: 7200
  blacklist:
    prefix: "auth:blacklist:"
